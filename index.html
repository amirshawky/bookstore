<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Inventory Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        // Configuration will be loaded from Google Drive
        let CONFIG = null;
        
        // IMPORTANT: Replace this with your Google Drive shared link to config.json
        // The link should be publicly accessible (Anyone with the link can view)
        // Convert the sharing link to direct download link format
        const CONFIG_FILE_URL = 'https://drive.google.com/uc?export=download&id=1l6--JxpfIsMJWZGB_WK0fHJHXy2C559y';
        
        // Function to convert Google Drive sharing link to direct download link
        function getDirectDownloadLink(shareLink) {
            // If already a direct link, return as-is
            if (shareLink.includes('/uc?')) return shareLink;
            
            // Extract file ID from sharing link
            const match = shareLink.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if (match) {
                const fileId = match[1];
                return `https://drive.google.com/uc?export=download&id=${fileId}`;
            }
            return shareLink;
        }

        // Load configuration from Google Drive
        async function loadConfig() {
            try {
                const directLink = getDirectDownloadLink(CONFIG_FILE_URL);
                const response = await fetch(directLink);
                
                if (!response.ok) {
                    throw new Error('Failed to load configuration file');
                }
                
                const config = await response.json();
                return config;
            } catch (error) {
                console.error('Error loading config:', error);
                throw new Error('Could not load configuration. Please check the CONFIG_FILE_URL.');
            }
        }

        // Initialize storage
        const storage = window.storage || {
            async get(key) {
                try {
                    const data = localStorage.getItem(key);
                    return data ? { key, value: data, shared: false } : null;
                } catch (error) {
                    console.error('Storage get error:', error);
                    return null;
                }
            },
            async set(key, value) {
                try {
                    localStorage.setItem(key, value);
                    return { key, value, shared: false };
                } catch (error) {
                    console.error('Storage set error:', error);
                    return null;
                }
            },
            async delete(key) {
                try {
                    localStorage.removeItem(key);
                    return { key, deleted: true, shared: false };
                } catch (error) {
                    console.error('Storage delete error:', error);
                    return null;
                }
            },
            async list(prefix) {
                try {
                    const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
                    return { keys, shared: false };
                } catch (error) {
                    console.error('Storage list error:', error);
                    return { keys: [], shared: false };
                }
            }
        };

        // User Management System
        const UserManager = {
            async getUsers() {
                const result = await storage.get('users');
                return result ? JSON.parse(result.value) : {};
            },
            
            async saveUsers(users) {
                await storage.set('users', JSON.stringify(users));
            },
            
            async addUser(email, name, picture, role = 'pending') {
                const users = await this.getUsers();
                users[email] = {
                    email,
                    name,
                    picture,
                    role,
                    createdAt: new Date().toISOString()
                };
                await this.saveUsers(users);
                return users[email];
            },
            
            async getUser(email) {
                const users = await this.getUsers();
                return users[email] || null;
            },
            
            async updateUserRole(email, role) {
                const users = await this.getUsers();
                if (users[email]) {
                    users[email].role = role;
                    await this.saveUsers(users);
                    return true;
                }
                return false;
            },
            
            async getPendingUsers() {
                const users = await this.getUsers();
                return Object.values(users).filter(u => u.role === 'pending');
            },
            
            async initializeAdmin() {
                const users = await this.getUsers();
                return Object.keys(users).length === 0;
            }
        };

        // Square API Integration
        const SquareAPI = {
            async searchInventory(searchTerm) {
                try {
                    const items = await this.getAllItems();
                    
                    const filtered = items.filter(item => {
                        const name = item.name?.toLowerCase() || '';
                        const description = item.description?.toLowerCase() || '';
                        const sku = item.sku?.toLowerCase() || '';
                        const author = item.author?.toLowerCase() || '';
                        const publisher = item.publisher?.toLowerCase() || '';
                        const search = searchTerm.toLowerCase();
                        
                        return name.includes(search) || 
                               description.includes(search) || 
                               sku.includes(search) ||
                               author.includes(search) ||
                               publisher.includes(search);
                    });
                    
                    return filtered;
                } catch (error) {
                    console.error('Search error:', error);
                    throw error;
                }
            },
            
            async getAllItems() {
                try {
                    let allItems = [];
                    let cursor = null;
                    
                    // Fetch all pages
                    do {
                        const body = {
                            enabled_location_ids: [CONFIG.square.locationId]
                        };
                        
                        if (cursor) {
                            body.cursor = cursor;
                        }
                        
                        const response = await fetch('https://connect.squareup.com/v2/catalog/search-catalog-items', {
                            method: 'POST',
                            headers: {
                                'Square-Version': '2024-12-18',
                                'Authorization': `Bearer ${CONFIG.square.accessToken}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(body)
                        });
                        
                        if (!response.ok) {
                            throw new Error(`Square API error: ${response.status}`);
                        }
                        
                        const data = await response.json();
                        const items = data.items || [];
                        allItems = allItems.concat(items);
                        
                        cursor = data.cursor;
                    } while (cursor);
                    
                    return allItems.map(item => this.transformItem(item));
                } catch (error) {
                    console.error('Error fetching items:', error);
                    throw error;
                }
            },
            
            transformItem(item) {
                const itemData = item.item_data || {};
                const variation = itemData.variations?.[0] || {};
                const variationData = variation.item_variation_data || {};
                const customAttrs = item.custom_attribute_values || {};
                
                return {
                    id: item.id,
                    name: itemData.name || '',
                    description: itemData.description || '',
                    sku: variationData.sku || '',
                    price: variationData.price_money?.amount ? variationData.price_money.amount / 100 : 0,
                    author: customAttrs.author?.string_value || '',
                    publisher: customAttrs.publisher?.string_value || '',
                    shelfNumber: customAttrs.shelf_number?.string_value || '',
                    variationId: variation.id || ''
                };
            }
        };

        // Main App Component
        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [configError, setConfigError] = useState(null);
            const [view, setView] = useState('search');

            useEffect(() => {
                const initialize = async () => {
                    try {
                        // Load configuration from Google Drive
                        CONFIG = await loadConfig();
                        
                        // Check for existing session
                        const result = await storage.get('current_user');
                        if (result) {
                            const user = JSON.parse(result.value);
                            setCurrentUser(user);
                        }
                        
                        // Initialize Google Sign-In
                        if (window.google && CONFIG.google.clientId) {
                            window.google.accounts.id.initialize({
                                client_id: CONFIG.google.clientId,
                                callback: handleGoogleSignIn
                            });
                        }
                        
                        setLoading(false);
                    } catch (error) {
                        setConfigError(error.message);
                        setLoading(false);
                    }
                };
                
                initialize();
            }, []);

            const handleGoogleSignIn = async (response) => {
                try {
                    const payload = JSON.parse(atob(response.credential.split('.')[1]));
                    const { email, name, picture } = payload;
                    
                    const isFirstUser = await UserManager.initializeAdmin();
                    let user = await UserManager.getUser(email);
                    
                    if (!user) {
                        const role = isFirstUser ? 'admin' : 'pending';
                        user = await UserManager.addUser(email, name, picture, role);
                    }
                    
                    await storage.set('current_user', JSON.stringify(user));
                    setCurrentUser(user);
                } catch (error) {
                    console.error('Sign in error:', error);
                    alert('Failed to sign in. Please try again.');
                }
            };

            const handleSignOut = async () => {
                await storage.delete('current_user');
                setCurrentUser(null);
                setView('search');
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="text-xl text-gray-600 mb-2">Loading...</div>
                            <div className="text-sm text-gray-500">Connecting to Square inventory</div>
                        </div>
                    </div>
                );
            }

            if (configError) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-red-50 border border-red-200 rounded-lg p-6 max-w-md">
                            <h2 className="text-xl font-bold text-red-800 mb-2">Configuration Error</h2>
                            <p className="text-red-700 mb-4">{configError}</p>
                            <p className="text-sm text-red-600">
                                Please check that the CONFIG_FILE_URL is set correctly and the config.json file is accessible on Google Drive.
                            </p>
                        </div>
                    </div>
                );
            }

            if (!currentUser) {
                return <LoginScreen />;
            }

            if (currentUser.role === 'pending') {
                return <PendingApproval user={currentUser} onSignOut={handleSignOut} />;
            }

            return (
                <div className="min-h-screen">
                    <Header 
                        user={currentUser} 
                        onSignOut={handleSignOut}
                        view={view}
                        setView={setView}
                    />
                    
                    {view === 'search' && <SearchView />}
                    {view === 'admin' && currentUser.role === 'admin' && <AdminView />}
                </div>
            );
        }

        // Login Screen
        function LoginScreen() {
            useEffect(() => {
                if (window.google && CONFIG?.google?.clientId) {
                    window.google.accounts.id.renderButton(
                        document.getElementById('googleSignInButton'),
                        { 
                            theme: 'outline', 
                            size: 'large',
                            text: 'signin_with',
                            width: 300
                        }
                    );
                }
            }, []);

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 to-purple-600 p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full">
                        <div className="text-center mb-8">
                            <div className="text-5xl mb-4">📚</div>
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">
                                Bookstore Inventory
                            </h1>
                            <p className="text-gray-600">
                                Search and browse our collection
                            </p>
                        </div>
                        
                        <div id="googleSignInButton" className="flex justify-center"></div>
                        
                        <div className="mt-6 text-center text-sm text-gray-500">
                            Sign in with your Google account to access the inventory
                        </div>
                    </div>
                </div>
            );
        }

        // Pending Approval Screen
        function PendingApproval({ user, onSignOut }) {
            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50 p-4">
                    <div className="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
                        <div className="mb-4">
                            <img 
                                src={user.picture} 
                                alt={user.name}
                                className="w-20 h-20 rounded-full mx-auto mb-4"
                            />
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">
                                Welcome, {user.name}!
                            </h2>
                        </div>
                        
                        <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6">
                            <p className="text-yellow-800">
                                ⏳ Your account is pending approval
                            </p>
                        </div>
                        
                        <p className="text-gray-600 mb-6">
                            An administrator will review your request shortly. You'll be able to search the inventory once approved.
                        </p>
                        
                        <button
                            onClick={onSignOut}
                            className="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition"
                        >
                            Sign Out
                        </button>
                    </div>
                </div>
            );
        }

        // Header Component (Compact for Google Sites)
        function Header({ user, onSignOut, view, setView }) {
            return (
                <header className="bg-white shadow-sm border-b">
                    <div className="max-w-7xl mx-auto px-3 sm:px-4">
                        <div className="flex justify-between items-center h-14">
                            <div className="flex items-center space-x-2 sm:space-x-4">
                                <h1 className="text-lg sm:text-xl font-bold text-gray-800">
                                    📚 Inventory
                                </h1>
                                
                                <nav className="flex space-x-1">
                                    <button
                                        onClick={() => setView('search')}
                                        className={`px-2 sm:px-4 py-1.5 text-sm rounded-lg transition ${
                                            view === 'search'
                                                ? 'bg-blue-500 text-white'
                                                : 'text-gray-600 hover:bg-gray-100'
                                        }`}
                                    >
                                        Search
                                    </button>
                                    
                                    {user.role === 'admin' && (
                                        <button
                                            onClick={() => setView('admin')}
                                            className={`px-2 sm:px-4 py-1.5 text-sm rounded-lg transition ${
                                                view === 'admin'
                                                    ? 'bg-blue-500 text-white'
                                                    : 'text-gray-600 hover:bg-gray-100'
                                            }`}
                                        >
                                            Admin
                                        </button>
                                    )}
                                </nav>
                            </div>
                            
                            <div className="flex items-center space-x-2">
                                <img 
                                    src={user.picture} 
                                    alt={user.name}
                                    className="w-8 h-8 rounded-full"
                                />
                                <button
                                    onClick={onSignOut}
                                    className="px-3 py-1.5 text-xs sm:text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition"
                                >
                                    Sign Out
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        // Search View (Optimized for embedding)
        function SearchView() {
            const [searchTerm, setSearchTerm] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searched, setSearched] = useState(false);

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchTerm.trim()) return;
                
                setLoading(true);
                setSearched(true);
                
                try {
                    const items = await SquareAPI.searchInventory(searchTerm);
                    setResults(items);
                } catch (error) {
                    alert('Failed to search inventory. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
                    <div className="mb-4 sm:mb-6">
                        <form onSubmit={handleSearch} className="flex gap-2">
                            <input
                                type="text"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                placeholder="Search by name, author, publisher, SKU..."
                                className="flex-1 px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            />
                            <button
                                type="submit"
                                disabled={loading}
                                className="px-4 sm:px-6 py-2 sm:py-3 text-sm sm:text-base bg-blue-500 text-white rounded-lg hover:bg-blue-600 disabled:opacity-50 transition"
                            >
                                {loading ? '...' : 'Search'}
                            </button>
                        </form>
                    </div>

                    {loading && (
                        <div className="text-center py-8 sm:py-12">
                            <div className="text-lg sm:text-xl text-gray-600">Searching...</div>
                        </div>
                    )}

                    {!loading && searched && results.length === 0 && (
                        <div className="text-center py-8 sm:py-12">
                            <div className="text-lg sm:text-xl text-gray-600">No results found</div>
                            <p className="text-gray-500 mt-2 text-sm sm:text-base">Try a different search term</p>
                        </div>
                    )}

                    {!loading && results.length > 0 && (
                        <div>
                            <div className="mb-3 text-xs sm:text-sm text-gray-600">
                                Found {results.length} item{results.length !== 1 ? 's' : ''}
                            </div>
                            
                            <div className="grid gap-3 sm:gap-4 sm:grid-cols-2 lg:grid-cols-3">
                                {results.map(item => (
                                    <ItemCard key={item.id} item={item} />
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Item Card Component (Compact)
        function ItemCard({ item }) {
            const [expanded, setExpanded] = useState(false);
            
            const getCleanDescription = (desc) => {
                if (!desc) return '';
                const lines = desc.split('\n');
                if (lines.length > 3) {
                    const lastThree = lines.slice(-3);
                    const hasAttrs = lastThree.some(line => 
                        line.startsWith('Author:') || 
                        line.startsWith('Publisher:') || 
                        line.startsWith('Shelf No:')
                    );
                    if (hasAttrs) return lines.slice(0, -3).join('\n');
                }
                return desc;
            };
            
            const cleanDescription = getCleanDescription(item.description);

            return (
                <div className="bg-white rounded-lg shadow-md p-4 hover:shadow-lg transition-shadow">
                    <h3 className="text-base sm:text-lg font-bold text-gray-800 mb-2">
                        {item.name}
                    </h3>
                    
                    {cleanDescription && (
                        <p className="text-gray-600 text-xs sm:text-sm mb-2 whitespace-pre-line">
                            {expanded ? cleanDescription : cleanDescription.slice(0, 80) + (cleanDescription.length > 80 ? '...' : '')}
                        </p>
                    )}
                    
                    {cleanDescription.length > 80 && (
                        <button
                            onClick={() => setExpanded(!expanded)}
                            className="text-blue-500 text-xs mb-2 hover:underline"
                        >
                            {expanded ? 'Show less' : 'Show more'}
                        </button>
                    )}
                    
                    <div className="space-y-1 text-xs sm:text-sm">
                        {item.sku && (
                            <div className="flex">
                                <span className="text-gray-500 w-16">SKU:</span>
                                <span className="text-gray-700 font-medium">{item.sku}</span>
                            </div>
                        )}
                        
                        {item.price > 0 && (
                            <div className="flex">
                                <span className="text-gray-500 w-16">Price:</span>
                                <span className="text-gray-700 font-medium">${item.price.toFixed(2)}</span>
                            </div>
                        )}
                        
                        {item.author && (
                            <div className="flex">
                                <span className="text-gray-500 w-16">Author:</span>
                                <span className="text-gray-700">{item.author}</span>
                            </div>
                        )}
                        
                        {item.publisher && (
                            <div className="flex">
                                <span className="text-gray-500 w-16">Publisher:</span>
                                <span className="text-gray-700 text-xs">{item.publisher}</span>
                            </div>
                        )}
                        
                        {item.shelfNumber && (
                            <div className="flex">
                                <span className="text-gray-500 w-16">Shelf:</span>
                                <span className="text-gray-700">{item.shelfNumber}</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Admin View (same as before but with compact styling)
        function AdminView() {
            const [pendingUsers, setPendingUsers] = useState([]);
            const [allUsers, setAllUsers] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadUsers();
            }, []);

            const loadUsers = async () => {
                setLoading(true);
                const pending = await UserManager.getPendingUsers();
                const all = await UserManager.getUsers();
                setPendingUsers(pending);
                setAllUsers(Object.values(all));
                setLoading(false);
            };

            const handleApprove = async (email) => {
                await UserManager.updateUserRole(email, 'user');
                await loadUsers();
            };

            const handleReject = async (email) => {
                const users = await UserManager.getUsers();
                delete users[email];
                await UserManager.saveUsers(users);
                await loadUsers();
            };

            const handleMakeAdmin = async (email) => {
                if (confirm('Make this user an admin?')) {
                    await UserManager.updateUserRole(email, 'admin');
                    await loadUsers();
                }
            };

            const handleRevokeAdmin = async (email) => {
                if (confirm('Revoke admin privileges?')) {
                    await UserManager.updateUserRole(email, 'user');
                    await loadUsers();
                }
            };

            if (loading) {
                return <div className="text-center py-8">Loading users...</div>;
            }

            return (
                <div className="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
                    <h2 className="text-xl sm:text-2xl font-bold text-gray-800 mb-4 sm:mb-6">
                        User Management
                    </h2>

                    {pendingUsers.length > 0 && (
                        <div className="mb-6 sm:mb-8">
                            <h3 className="text-lg sm:text-xl font-semibold text-gray-700 mb-3 sm:mb-4">
                                Pending Approvals ({pendingUsers.length})
                            </h3>
                            <div className="bg-white rounded-lg shadow overflow-hidden">
                                {pendingUsers.map(user => (
                                    <div key={user.email} className="border-b last:border-b-0 p-3 sm:p-4">
                                        <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                                            <div className="flex items-center space-x-3">
                                                <img 
                                                    src={user.picture} 
                                                    alt={user.name}
                                                    className="w-10 h-10 sm:w-12 sm:h-12 rounded-full"
                                                />
                                                <div>
                                                    <div className="font-medium text-gray-800 text-sm sm:text-base">{user.name}</div>
                                                    <div className="text-xs sm:text-sm text-gray-500">{user.email}</div>
                                                </div>
                                            </div>
                                            <div className="flex space-x-2">
                                                <button
                                                    onClick={() => handleApprove(user.email)}
                                                    className="px-3 sm:px-4 py-1.5 sm:py-2 text-sm bg-green-500 text-white rounded-lg hover:bg-green-600 transition"
                                                >
                                                    Approve
                                                </button>
                                                <button
                                                    onClick={() => handleReject(user.email)}
                                                    className="px-3 sm:px-4 py-1.5 sm:py-2 text-sm bg-red-500 text-white rounded-lg hover:bg-red-600 transition"
                                                >
                                                    Reject
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div>
                        <h3 className="text-lg sm:text-xl font-semibold text-gray-700 mb-3 sm:mb-4">
                            All Users ({allUsers.length})
                        </h3>
                        <div className="bg-white rounded-lg shadow overflow-hidden">
                            {allUsers.map(user => (
                                <div key={user.email} className="border-b last:border-b-0 p-3 sm:p-4">
                                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                                        <div className="flex items-center space-x-3">
                                            <img 
                                                src={user.picture} 
                                                alt={user.name}
                                                className="w-10 h-10 sm:w-12 sm:h-12 rounded-full"
                                            />
                                            <div>
                                                <div className="font-medium text-gray-800 text-sm sm:text-base">{user.name}</div>
                                                <div className="text-xs sm:text-sm text-gray-500">{user.email}</div>
                                                <span className={`inline-block px-2 py-0.5 text-xs rounded mt-1 ${
                                                    user.role === 'admin' ? 'bg-purple-100 text-purple-800' :
                                                    user.role === 'user' ? 'bg-blue-100 text-blue-800' :
                                                    'bg-yellow-100 text-yellow-800'
                                                }`}>
                                                    {user.role}
                                                </span>
                                            </div>
                                        </div>
                                        {user.role !== 'pending' && (
                                            <div>
                                                {user.role === 'user' && (
                                                    <button
                                                        onClick={() => handleMakeAdmin(user.email)}
                                                        className="px-3 sm:px-4 py-1.5 text-sm bg-purple-500 text-white rounded-lg hover:bg-purple-600 transition"
                                                    >
                                                        Make Admin
                                                    </button>
                                                )}
                                                {user.role === 'admin' && (
                                                    <button
                                                        onClick={() => handleRevokeAdmin(user.email)}
                                                        className="px-3 sm:px-4 py-1.5 text-sm bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition"
                                                    >
                                                        Revoke Admin
                                                    </button>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
