<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuration
        const SQUARE_CONFIG = {
            accessToken: 'YOUR_SQUARE_ACCESS_TOKEN',
            locationId: 'YOUR_LOCATION_ID',
            // IMPORTANT: This uses the Vercel proxy endpoint
            proxyUrl: '/api/square-proxy'
        };
        
        function validateConfig() {
            const errors = [];
            if (!SQUARE_CONFIG.accessToken || SQUARE_CONFIG.accessToken === 'YOUR_SQUARE_ACCESS_TOKEN') {
                errors.push('Square Access Token not configured');
            }
            if (!SQUARE_CONFIG.locationId || SQUARE_CONFIG.locationId === 'YOUR_LOCATION_ID') {
                errors.push('Square Location ID not configured');
            }
            return errors;
        }

        // Storage
        const storage = {
            get(key) {
                try {
                    const data = localStorage.getItem('bookstore_' + key);
                    return data ? JSON.parse(data) : null;
                } catch (e) { return null; }
            },
            set(key, value) {
                try {
                    localStorage.setItem('bookstore_' + key, JSON.stringify(value));
                    return true;
                } catch (e) { return false; }
            },
            delete(key) {
                try {
                    localStorage.removeItem('bookstore_' + key);
                    return true;
                } catch (e) { return false; }
            }
        };

        async function hashPassword(password) {
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const AuthManager = {
            getUsers() { return storage.get('users') || {}; },
            saveUsers(users) { storage.set('users', users); },
            
            async register(username, password, email, fullName) {
                const users = this.getUsers();
                const key = username.toLowerCase();
                if (users[key]) return { success: false, error: 'Username exists' };
                
                users[key] = {
                    username: key,
                    password: await hashPassword(password),
                    email, fullName,
                    role: Object.keys(users).length === 0 ? 'admin' : 'pending',
                    createdAt: new Date().toISOString()
                };
                this.saveUsers(users);
                return { success: true, role: users[key].role };
            },
            
            async login(username, password) {
                const users = this.getUsers();
                const user = users[username.toLowerCase()];
                if (!user) return { success: false, error: 'Invalid credentials' };
                
                const hashedPassword = await hashPassword(password);
                if (user.password !== hashedPassword) return { success: false, error: 'Invalid credentials' };
                if (user.role === 'pending') return { success: false, error: 'Pending approval' };
                
                return {
                    success: true,
                    user: { username: user.username, email: user.email, fullName: user.fullName, role: user.role }
                };
            },
            
            updateUserRole(username, role) {
                const users = this.getUsers();
                if (users[username.toLowerCase()]) {
                    users[username.toLowerCase()].role = role;
                    this.saveUsers(users);
                    return true;
                }
                return false;
            },
            
            deleteUser(username) {
                const users = this.getUsers();
                delete users[username.toLowerCase()];
                this.saveUsers(users);
            },
            
            getAllUsers() { return Object.values(this.getUsers()); },
            getPendingUsers() { return this.getAllUsers().filter(u => u.role === 'pending'); }
        };

        const SquareAPI = {
            async searchInventory(searchTerm) {
                const items = await this.getAllItems();
                const search = searchTerm.toLowerCase();
                return items.filter(item =>
                    (item.name?.toLowerCase() || '').includes(search) ||
                    (item.description?.toLowerCase() || '').includes(search) ||
                    (item.sku?.toLowerCase() || '').includes(search) ||
                    (item.author?.toLowerCase() || '').includes(search) ||
                    (item.publisher?.toLowerCase() || '').includes(search)
                );
            },
            
            async getAllItems() {
                let allItems = [];
                let cursor = null;
                
                do {
                    // Call our Vercel proxy instead of Square API directly
                    const response = await fetch(SQUARE_CONFIG.proxyUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            accessToken: SQUARE_CONFIG.accessToken,
                            locationId: SQUARE_CONFIG.locationId,
                            cursor
                        })
                    });
                    
                    if (!response.ok) throw new Error('API error: ' + response.status);
                    
                    const data = await response.json();
                    allItems = allItems.concat(data.items || []);
                    cursor = data.cursor;
                } while (cursor);
                
                return allItems.map(item => this.transformItem(item));
            },
            
            transformItem(item) {
                const itemData = item.item_data || {};
                const variation = itemData.variations?.[0] || {};
                const variationData = variation.item_variation_data || {};
                const customAttrs = item.custom_attribute_values || {};
                
                return {
                    id: item.id,
                    name: itemData.name || '',
                    description: itemData.description || '',
                    sku: variationData.sku || '',
                    price: variationData.price_money?.amount ? variationData.price_money.amount / 100 : 0,
                    author: customAttrs.author?.string_value || '',
                    publisher: customAttrs.publisher?.string_value || '',
                    shelfNumber: customAttrs.shelf_number?.string_value || ''
                };
            }
        };

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('search');
            const [configError, setConfigError] = useState(null);

            useEffect(() => {
                const errors = validateConfig();
                if (errors.length > 0) {
                    setConfigError(errors);
                    setLoading(false);
                    return;
                }
                
                const session = storage.get('session');
                if (session) setCurrentUser(session);
                setLoading(false);
            }, []);

            if (loading) return <div className="min-h-screen flex items-center justify-center"><div className="text-xl">Loading...</div></div>;

            if (configError) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-red-50 border-2 border-red-300 rounded-xl p-8 max-w-2xl">
                            <h2 className="text-2xl font-bold text-red-800 mb-4">⚠️ Configuration Required</h2>
                            <div className="bg-white rounded-lg p-4">
                                <ul className="list-disc ml-6 text-red-600">
                                    {configError.map((e, i) => <li key={i}>{e}</li>)}
                                </ul>
                            </div>
                            <p className="text-sm mt-4">Edit index.html and update SQUARE_CONFIG</p>
                        </div>
                    </div>
                );
            }

            if (!currentUser) return <AuthScreen onLogin={(user) => { setCurrentUser(user); storage.set('session', user); }} />;

            return (
                <div className="min-h-screen">
                    <Header user={currentUser} onLogout={() => { setCurrentUser(null); storage.delete('session'); setView('search'); }} view={view} setView={setView} />
                    {view === 'search' && <SearchView />}
                    {view === 'admin' && currentUser.role === 'admin' && <AdminView />}
                </div>
            );
        }

        function AuthScreen({ onLogin }) {
            const [isLogin, setIsLogin] = useState(true);
            const [formData, setFormData] = useState({ username: '', password: '', email: '', fullName: '', confirmPassword: '' });
            const [error, setError] = useState('');
            const [message, setMessage] = useState('');

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
                setError('');
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError(''); setMessage('');

                if (!formData.username || !formData.password) {
                    setError('Enter username and password');
                    return;
                }

                if (isLogin) {
                    const result = await AuthManager.login(formData.username, formData.password);
                    if (result.success) {
                        onLogin(result.user);
                    } else {
                        setError(result.error);
                    }
                } else {
                    if (!formData.email || !formData.fullName) { setError('Fill all fields'); return; }
                    if (formData.password.length < 6) { setError('Password must be 6+ chars'); return; }
                    if (formData.password !== formData.confirmPassword) { setError('Passwords do not match'); return; }

                    const result = await AuthManager.register(formData.username, formData.password, formData.email, formData.fullName);
                    if (result.success) {
                        if (result.role === 'admin') {
                            setMessage('First user - admin! Logging in...');
                            setTimeout(() => handleSubmit(e), 1500);
                        } else {
                            setMessage('Registered! Pending approval.');
                            setTimeout(() => { setIsLogin(true); setFormData({ ...formData, password: '', confirmPassword: '' }); }, 2500);
                        }
                    } else {
                        setError(result.error);
                    }
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 to-purple-600 p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full">
                        <div className="text-center mb-6">
                            <div className="text-5xl mb-4">📚</div>
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">Bookstore Inventory</h1>
                        </div>

                        {error && <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">{error}</div>}
                        {message && <div className="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm">{message}</div>}

                        <form onSubmit={handleSubmit} className="space-y-4">
                            {!isLogin && (
                                <>
                                    <input type="text" name="fullName" value={formData.fullName} onChange={handleChange} placeholder="Full Name" className="w-full px-4 py-2 border rounded-lg" />
                                    <input type="email" name="email" value={formData.email} onChange={handleChange} placeholder="Email" className="w-full px-4 py-2 border rounded-lg" />
                                </>
                            )}
                            <input type="text" name="username" value={formData.username} onChange={handleChange} placeholder="Username" className="w-full px-4 py-2 border rounded-lg" />
                            <input type="password" name="password" value={formData.password} onChange={handleChange} placeholder="Password" className="w-full px-4 py-2 border rounded-lg" />
                            {!isLogin && <input type="password" name="confirmPassword" value={formData.confirmPassword} onChange={handleChange} placeholder="Confirm Password" className="w-full px-4 py-2 border rounded-lg" />}
                            <button type="submit" className="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">{isLogin ? 'Sign In' : 'Register'}</button>
                            <button type="button" onClick={() => setIsLogin(!isLogin)} className="w-full text-sm text-blue-500 hover:underline">{isLogin ? 'Create account' : 'Back to login'}</button>
                        </form>
                    </div>
                </div>
            );
        }

        function Header({ user, onLogout, view, setView }) {
            return (
                <header className="bg-white shadow-sm border-b">
                    <div className="max-w-7xl mx-auto px-4 h-14 flex justify-between items-center">
                        <div className="flex items-center space-x-4">
                            <h1 className="text-xl font-bold">📚 Inventory</h1>
                            <nav className="flex space-x-1">
                                <button onClick={() => setView('search')} className={`px-4 py-1.5 text-sm rounded-lg ${view === 'search' ? 'bg-blue-500 text-white' : 'text-gray-600 hover:bg-gray-100'}`}>Search</button>
                                {user.role === 'admin' && <button onClick={() => setView('admin')} className={`px-4 py-1.5 text-sm rounded-lg ${view === 'admin' ? 'bg-blue-500 text-white' : 'text-gray-600 hover:bg-gray-100'}`}>Admin</button>}
                            </nav>
                        </div>
                        <div className="flex items-center space-x-2">
                            <div className="text-sm"><div className="font-medium">{user.fullName}</div><div className="text-xs text-gray-500">{user.role}</div></div>
                            <button onClick={onLogout} className="px-3 py-1.5 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Logout</button>
                        </div>
                    </div>
                </header>
            );
        }

        function SearchView() {
            const [searchTerm, setSearchTerm] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searched, setSearched] = useState(false);

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchTerm.trim()) return;
                setLoading(true); setSearched(true);
                try {
                    const items = await SquareAPI.searchInventory(searchTerm);
                    setResults(items);
                } catch (error) {
                    alert('Search failed: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-7xl mx-auto px-4 py-6">
                    <form onSubmit={handleSearch} className="flex gap-2 mb-6">
                        <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} placeholder="Search..." className="flex-1 px-4 py-3 border rounded-lg" />
                        <button type="submit" disabled={loading} className="px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 disabled:opacity-50">{loading ? '...' : 'Search'}</button>
                    </form>
                    {loading && <div className="text-center py-12"><div className="text-xl">Searching...</div></div>}
                    {!loading && searched && results.length === 0 && <div className="text-center py-12"><div className="text-xl">No results</div></div>}
                    {!loading && results.length > 0 && (
                        <div>
                            <div className="mb-3 text-sm">Found {results.length} items</div>
                            <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                                {results.map(item => (
                                    <div key={item.id} className="bg-white rounded-lg shadow-md p-4">
                                        <h3 className="font-bold mb-2">{item.name}</h3>
                                        {item.description && <p className="text-sm text-gray-600 mb-2">{item.description.slice(0, 100)}...</p>}
                                        <div className="text-sm space-y-1">
                                            {item.sku && <div className="flex"><span className="text-gray-500 w-16">SKU:</span><span className="font-medium">{item.sku}</span></div>}
                                            {item.price > 0 && <div className="flex"><span className="text-gray-500 w-16">Price:</span><span className="font-medium">${item.price.toFixed(2)}</span></div>}
                                            {item.author && <div className="flex"><span className="text-gray-500 w-16">Author:</span><span>{item.author}</span></div>}
                                            {item.publisher && <div className="flex"><span className="text-gray-500 w-16">Publisher:</span><span className="text-xs">{item.publisher}</span></div>}
                                            {item.shelfNumber && <div className="flex"><span className="text-gray-500 w-16">Shelf:</span><span>{item.shelfNumber}</span></div>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function AdminView() {
            const [pendingUsers, setPendingUsers] = useState([]);
            const [allUsers, setAllUsers] = useState([]);

            useEffect(() => { loadUsers(); }, []);

            const loadUsers = () => {
                setPendingUsers(AuthManager.getPendingUsers());
                setAllUsers(AuthManager.getAllUsers());
            };

            return (
                <div className="max-w-7xl mx-auto px-4 py-6">
                    <h2 className="text-2xl font-bold mb-6">User Management</h2>
                    {pendingUsers.length > 0 && (
                        <div className="mb-8">
                            <h3 className="text-xl font-semibold mb-4">Pending ({pendingUsers.length})</h3>
                            <div className="bg-white rounded-lg shadow">
                                {pendingUsers.map(user => (
                                    <div key={user.username} className="border-b last:border-b-0 p-4 flex justify-between items-center">
                                        <div>
                                            <div className="font-medium">{user.fullName}</div>
                                            <div className="text-sm text-gray-500">@{user.username} • {user.email}</div>
                                        </div>
                                        <div className="space-x-2">
                                            <button onClick={() => { AuthManager.updateUserRole(user.username, 'user'); loadUsers(); }} className="px-4 py-2 text-sm bg-green-500 text-white rounded-lg">Approve</button>
                                            <button onClick={() => { if (confirm('Delete?')) { AuthManager.deleteUser(user.username); loadUsers(); } }} className="px-4 py-2 text-sm bg-red-500 text-white rounded-lg">Reject</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    <div>
                        <h3 className="text-xl font-semibold mb-4">All Users ({allUsers.length})</h3>
                        <div className="bg-white rounded-lg shadow">
                            {allUsers.map(user => (
                                <div key={user.username} className="border-b last:border-b-0 p-4 flex justify-between items-center">
                                    <div>
                                        <div className="font-medium">{user.fullName}</div>
                                        <div className="text-sm text-gray-500">@{user.username} • {user.email}</div>
                                        <span className={`inline-block px-2 py-0.5 text-xs rounded mt-1 ${user.role === 'admin' ? 'bg-purple-100 text-purple-800' : user.role === 'user' ? 'bg-blue-100 text-blue-800' : 'bg-yellow-100 text-yellow-800'}`}>{user.role}</span>
                                    </div>
                                    {user.role !== 'pending' && (
                                        <div>
                                            {user.role === 'user' && <button onClick={() => { if (confirm('Make admin?')) { AuthManager.updateUserRole(user.username, 'admin'); loadUsers(); } }} className="px-4 py-1.5 text-sm bg-purple-500 text-white rounded-lg">Make Admin</button>}
                                            {user.role === 'admin' && <button onClick={() => { if (confirm('Revoke admin?')) { AuthManager.updateUserRole(user.username, 'user'); loadUsers(); } }} className="px-4 py-1.5 text-sm bg-gray-500 text-white rounded-lg">Revoke</button>}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
