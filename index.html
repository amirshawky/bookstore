<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Inventory Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ========================================
        // CONFIGURATION - UPDATE THESE VALUES
        // ========================================
        const SQUARE_CONFIG = {
           accessToken: 'EAAAl12N5ApoxZoy_ILv_aRqzNbJCpTuZF2CMkXIjIpiUFACtuS_mxMLPg4BqOvM',
            locationId: 'LYE44QAJ31T28',
            environment: 'production'
        };
        // ========================================
        
        // Validate configuration
        function validateConfig() {
            const errors = [];
            if (!SQUARE_CONFIG.accessToken || SQUARE_CONFIG.accessToken === 'YOUR_SQUARE_ACCESS_TOKEN') {
                errors.push('Square Access Token not set');
            }
            if (!SQUARE_CONFIG.locationId || SQUARE_CONFIG.locationId === 'YOUR_LOCATION_ID') {
                errors.push('Square Location ID not set');
            }
            return errors;
        }

        // Storage helper with unique keys to avoid conflicts
        const STORAGE_PREFIX = 'bookstore_v1_';
        
        const storage = {
            async get(key) {
                try {
                    const fullKey = STORAGE_PREFIX + key;
                    const data = localStorage.getItem(fullKey);
                    console.log(`Storage GET ${fullKey}:`, data ? 'found' : 'not found');
                    return data ? { key, value: data } : null;
                } catch (error) {
                    console.error('Storage get error:', error);
                    alert('Storage error: Your browser may be blocking localStorage. Try opening this page directly (not in an iframe).');
                    return null;
                }
            },
            async set(key, value) {
                try {
                    const fullKey = STORAGE_PREFIX + key;
                    localStorage.setItem(fullKey, value);
                    console.log(`Storage SET ${fullKey}: success`);
                    return { key, value };
                } catch (error) {
                    console.error('Storage set error:', error);
                    alert('Storage error: Unable to save data. Your browser may be blocking localStorage.');
                    return null;
                }
            },
            async delete(key) {
                try {
                    const fullKey = STORAGE_PREFIX + key;
                    localStorage.removeItem(fullKey);
                    console.log(`Storage DELETE ${fullKey}: success`);
                    return { key, deleted: true };
                } catch (error) {
                    console.error('Storage delete error:', error);
                    return null;
                }
            }
        };

        // Simple hash function (for demo - in production use proper bcrypt)
        async function hashPassword(password) {
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Auth Manager
        const AuthManager = {
            async getUsers() {
                const result = await storage.get('auth_users');
                return result ? JSON.parse(result.value) : {};
            },
            
            async saveUsers(users) {
                await storage.set('auth_users', JSON.stringify(users));
            },
            
            async register(username, password, email, fullName) {
                const users = await this.getUsers();
                
                // Check if username exists
                if (users[username.toLowerCase()]) {
                    return { success: false, error: 'Username already exists' };
                }
                
                // Hash password
                const hashedPassword = await hashPassword(password);
                
                // First user becomes admin, others pending
                const isFirstUser = Object.keys(users).length === 0;
                
                users[username.toLowerCase()] = {
                    username: username.toLowerCase(),
                    password: hashedPassword,
                    email,
                    fullName,
                    role: isFirstUser ? 'admin' : 'pending',
                    createdAt: new Date().toISOString(),
                    resetToken: null,
                    resetTokenExpiry: null
                };
                
                await this.saveUsers(users);
                return { success: true, role: users[username.toLowerCase()].role };
            },
            
            async login(username, password) {
                const users = await this.getUsers();
                const user = users[username.toLowerCase()];
                
                if (!user) {
                    return { success: false, error: 'Invalid username or password' };
                }
                
                const hashedPassword = await hashPassword(password);
                if (user.password !== hashedPassword) {
                    return { success: false, error: 'Invalid username or password' };
                }
                
                if (user.role === 'pending') {
                    return { success: false, error: 'Your account is pending approval', pending: true };
                }
                
                return { 
                    success: true, 
                    user: {
                        username: user.username,
                        email: user.email,
                        fullName: user.fullName,
                        role: user.role
                    }
                };
            },
            
            async requestPasswordReset(username) {
                const users = await this.getUsers();
                const user = users[username.toLowerCase()];
                
                if (!user) {
                    return { success: false, error: 'Username not found' };
                }
                
                // Generate reset token
                const resetToken = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                const resetTokenExpiry = new Date(Date.now() + 3600000).toISOString(); // 1 hour
                
                user.resetToken = await hashPassword(resetToken);
                user.resetTokenExpiry = resetTokenExpiry;
                
                await this.saveUsers(users);
                
                // In a real app, you'd email this. For now, show it in alert
                return { success: true, resetToken, email: user.email };
            },
            
            async resetPassword(username, resetToken, newPassword) {
                const users = await this.getUsers();
                const user = users[username.toLowerCase()];
                
                if (!user) {
                    return { success: false, error: 'Invalid reset request' };
                }
                
                if (!user.resetToken || !user.resetTokenExpiry) {
                    return { success: false, error: 'No reset request found' };
                }
                
                if (new Date(user.resetTokenExpiry) < new Date()) {
                    return { success: false, error: 'Reset token expired' };
                }
                
                const hashedToken = await hashPassword(resetToken);
                if (user.resetToken !== hashedToken) {
                    return { success: false, error: 'Invalid reset token' };
                }
                
                // Update password
                user.password = await hashPassword(newPassword);
                user.resetToken = null;
                user.resetTokenExpiry = null;
                
                await this.saveUsers(users);
                return { success: true };
            },
            
            async updateUserRole(username, role) {
                const users = await this.getUsers();
                if (users[username.toLowerCase()]) {
                    users[username.toLowerCase()].role = role;
                    await this.saveUsers(users);
                    return true;
                }
                return false;
            },
            
            async deleteUser(username) {
                const users = await this.getUsers();
                delete users[username.toLowerCase()];
                await this.saveUsers(users);
            },
            
            async getAllUsers() {
                const users = await this.getUsers();
                return Object.values(users).map(u => ({
                    username: u.username,
                    email: u.email,
                    fullName: u.fullName,
                    role: u.role,
                    createdAt: u.createdAt
                }));
            },
            
            async getPendingUsers() {
                const users = await this.getAllUsers();
                return users.filter(u => u.role === 'pending');
            }
        };

        // Square API Integration (same as before)
        const SquareAPI = {
            async searchInventory(searchTerm) {
                try {
                    const items = await this.getAllItems();
                    const filtered = items.filter(item => {
                        const name = item.name?.toLowerCase() || '';
                        const description = item.description?.toLowerCase() || '';
                        const sku = item.sku?.toLowerCase() || '';
                        const author = item.author?.toLowerCase() || '';
                        const publisher = item.publisher?.toLowerCase() || '';
                        const search = searchTerm.toLowerCase();
                        
                        return name.includes(search) || description.includes(search) || 
                               sku.includes(search) || author.includes(search) || publisher.includes(search);
                    });
                    return filtered;
                } catch (error) {
                    console.error('Search error:', error);
                    throw error;
                }
            },
            
            async getAllItems() {
                try {
                    let allItems = [];
                    let cursor = null;
                    
                    console.log('Fetching items from Square API...');
                    console.log('Access Token:', SQUARE_CONFIG.accessToken ? 'Set' : 'Not set');
                    console.log('Location ID:', SQUARE_CONFIG.locationId);
                    
                    do {
                        const body = { enabled_location_ids: [SQUARE_CONFIG.locationId] };
                        if (cursor) body.cursor = cursor;
                        
                        console.log('Making request to Square API...');
                        
                        const response = await fetch('https://connect.squareup.com/v2/catalog/search-catalog-items', {
                            method: 'POST',
                            headers: {
                                'Square-Version': '2024-12-18',
                                'Authorization': `Bearer ${SQUARE_CONFIG.accessToken}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(body)
                        });
                        
                        console.log('Response status:', response.status);
                        
                        if (!response.ok) {
                            const errorText = await response.text();
                            console.error('Square API error response:', errorText);
                            throw new Error(`Square API error: ${response.status} - ${errorText}`);
                        }
                        
                        const data = await response.json();
                        allItems = allItems.concat(data.items || []);
                        cursor = data.cursor;
                        
                        console.log(`Retrieved ${data.items?.length || 0} items, total: ${allItems.length}`);
                    } while (cursor);
                    
                    console.log(`Total items loaded: ${allItems.length}`);
                    return allItems.map(item => this.transformItem(item));
                } catch (error) {
                    console.error('Error fetching items:', error);
                    
                    // Check if it's a CORS error
                    if (error.message.includes('Failed to fetch') || error.name === 'TypeError') {
                        throw new Error('CORS Error: Cannot access Square API from this domain. This app must be accessed directly (not embedded in an iframe) or you need to set up a backend proxy.');
                    }
                    
                    throw error;
                }
            },
            
            transformItem(item) {
                const itemData = item.item_data || {};
                const variation = itemData.variations?.[0] || {};
                const variationData = variation.item_variation_data || {};
                const customAttrs = item.custom_attribute_values || {};
                
                return {
                    id: item.id,
                    name: itemData.name || '',
                    description: itemData.description || '',
                    sku: variationData.sku || '',
                    price: variationData.price_money?.amount ? variationData.price_money.amount / 100 : 0,
                    author: customAttrs.author?.string_value || '',
                    publisher: customAttrs.publisher?.string_value || '',
                    shelfNumber: customAttrs.shelf_number?.string_value || '',
                    variationId: variation.id || ''
                };
            }
        };

        // Check if running in iframe
        const isInIframe = () => {
            try {
                return window.self !== window.top;
            } catch (e) {
                return true;
            }
        };

        // Main App
        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('search');
            const [configError, setConfigError] = useState(null);
            const [showIframeWarning] = useState(isInIframe());

            useEffect(() => {
                if (showIframeWarning) {
                    console.warn('⚠️ App is running in an iframe. This may cause CORS issues with Square API and localStorage problems.');
                }
                
                const configErrors = validateConfig();
                if (configErrors.length > 0) {
                    setConfigError(configErrors);
                    setLoading(false);
                    return;
                }
                
                const checkSession = async () => {
                    const result = await storage.get('current_session');
                    if (result) {
                        setCurrentUser(JSON.parse(result.value));
                    }
                    setLoading(false);
                };
                checkSession();
            }, []);

            const handleLogin = (user) => {
                setCurrentUser(user);
                storage.set('current_session', JSON.stringify(user));
            };

            const handleLogout = () => {
                setCurrentUser(null);
                storage.delete('current_session');
                setView('search');
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-xl text-gray-600">Loading...</div>
                    </div>
                );
            }

            if (configError) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-red-50 border-2 border-red-300 rounded-xl p-8 max-w-2xl">
                            <h2 className="text-2xl font-bold text-red-800 mb-4">⚠️ Configuration Required</h2>
                            <div className="bg-white rounded-lg p-4 mb-4">
                                <p className="font-bold text-red-700 mb-2">Missing configuration:</p>
                                <ul className="list-disc ml-6 text-red-600 space-y-1">
                                    {configError.map((error, i) => <li key={i}>{error}</li>)}
                                </ul>
                            </div>
                            <div className="text-sm text-gray-700">
                                <p className="font-bold mb-2">To fix: Edit this HTML file and update SQUARE_CONFIG values</p>
                            </div>
                        </div>
                    </div>
                );
            }

            if (!currentUser) {
                return <AuthScreen onLogin={handleLogin} showIframeWarning={showIframeWarning} />;
            }

            return (
                <div className="min-h-screen">
                    {showIframeWarning && (
                        <div className="bg-yellow-50 border-b-2 border-yellow-400 px-4 py-3">
                            <div className="max-w-7xl mx-auto flex items-center">
                                <span className="text-yellow-800 text-sm">
                                    ⚠️ <strong>Warning:</strong> This app is embedded in an iframe. For full functionality, 
                                    <a href={window.location.href} target="_blank" className="underline font-bold ml-1">
                                        open it in a new window
                                    </a>
                                </span>
                            </div>
                        </div>
                    )}
                    <Header user={currentUser} onLogout={handleLogout} view={view} setView={setView} />
                    {view === 'search' && <SearchView />}
                    {view === 'admin' && currentUser.role === 'admin' && <AdminView />}
                </div>
            );
        }

        // Auth Screen (Login/Register/Reset)
        function AuthScreen({ onLogin, showIframeWarning }) {
            const [mode, setMode] = useState('login'); // 'login', 'register', 'reset', 'resetConfirm'
            const [formData, setFormData] = useState({
                username: '', password: '', email: '', fullName: '', 
                confirmPassword: '', resetToken: '', newPassword: ''
            });
            const [error, setError] = useState('');
            const [message, setMessage] = useState('');

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
                setError('');
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                
                if (!formData.username || !formData.password) {
                    setError('Please enter username and password');
                    return;
                }
                
                const result = await AuthManager.login(formData.username, formData.password);
                if (result.success) {
                    onLogin(result.user);
                } else {
                    setError(result.error);
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setError('');
                
                if (!formData.username || !formData.password || !formData.email || !formData.fullName) {
                    setError('Please fill in all fields');
                    return;
                }
                
                if (formData.password.length < 6) {
                    setError('Password must be at least 6 characters');
                    return;
                }
                
                if (formData.password !== formData.confirmPassword) {
                    setError('Passwords do not match');
                    return;
                }
                
                const result = await AuthManager.register(
                    formData.username, formData.password, formData.email, formData.fullName
                );
                
                if (result.success) {
                    if (result.role === 'admin') {
                        setMessage('Account created! You are the first admin. Logging you in...');
                        setTimeout(() => {
                            handleLogin(e);
                        }, 2000);
                    } else {
                        setMessage('Registration successful! Your account is pending admin approval.');
                        setTimeout(() => {
                            setMode('login');
                            setFormData({ ...formData, password: '', confirmPassword: '' });
                        }, 3000);
                    }
                } else {
                    setError(result.error);
                }
            };

            const handleRequestReset = async (e) => {
                e.preventDefault();
                setError('');
                
                if (!formData.username) {
                    setError('Please enter your username');
                    return;
                }
                
                const result = await AuthManager.requestPasswordReset(formData.username);
                if (result.success) {
                    alert(`Password reset token for ${result.email}:\n\n${result.resetToken}\n\nCopy this token and use it to reset your password.\n\n(In production, this would be emailed to you)`);
                    setMode('resetConfirm');
                    setMessage('Reset token generated! Enter it below with your new password.');
                } else {
                    setError(result.error);
                }
            };

            const handleResetPassword = async (e) => {
                e.preventDefault();
                setError('');
                
                if (!formData.resetToken || !formData.newPassword) {
                    setError('Please enter reset token and new password');
                    return;
                }
                
                if (formData.newPassword.length < 6) {
                    setError('Password must be at least 6 characters');
                    return;
                }
                
                const result = await AuthManager.resetPassword(
                    formData.username, formData.resetToken, formData.newPassword
                );
                
                if (result.success) {
                    setMessage('Password reset successful! Please login with your new password.');
                    setTimeout(() => {
                        setMode('login');
                        setFormData({ username: formData.username, password: '', email: '', fullName: '', confirmPassword: '', resetToken: '', newPassword: '' });
                    }, 2000);
                } else {
                    setError(result.error);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 to-purple-600 p-4">
                    {showIframeWarning && (
                        <div className="fixed top-0 left-0 right-0 bg-yellow-50 border-b-2 border-yellow-400 px-4 py-2 z-50">
                            <div className="text-center text-yellow-800 text-sm">
                                ⚠️ For best results, <a href={window.location.href} target="_blank" className="underline font-bold">open this page directly</a>
                            </div>
                        </div>
                    )}
                    <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full">
                        <div className="text-center mb-6">
                            <div className="text-5xl mb-4">📚</div>
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">Bookstore Inventory</h1>
                            <p className="text-gray-600">
                                {mode === 'login' && 'Sign in to access inventory'}
                                {mode === 'register' && 'Create your account'}
                                {mode === 'reset' && 'Reset your password'}
                                {mode === 'resetConfirm' && 'Enter reset token'}
                            </p>
                        </div>

                        {error && (
                            <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
                                {error}
                            </div>
                        )}

                        {message && (
                            <div className="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm">
                                {message}
                            </div>
                        )}

                        {mode === 'login' && (
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Username</label>
                                    <input
                                        type="text"
                                        name="username"
                                        value={formData.username}
                                        onChange={handleChange}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="Enter username"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                    <input
                                        type="password"
                                        name="password"
                                        value={formData.password}
                                        onChange={handleChange}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="Enter password"
                                    />
                                </div>
                                <button type="submit" className="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition font-medium">
                                    Sign In
                                </button>
                                <div className="flex justify-between text-sm">
                                    <button type="button" onClick={() => setMode('register')} className="text-blue-500 hover:underline">
                                        Create account
                                    </button>
                                    <button type="button" onClick={() => setMode('reset')} className="text-blue-500 hover:underline">
                                        Forgot password?
                                    </button>
                                </div>
                            </form>
                        )}

                        {mode === 'register' && (
                            <form onSubmit={handleRegister} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                    <input
                                        type="text"
                                        name="fullName"
                                        value={formData.fullName}
                                        onChange={handleChange}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="John Doe"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                    <input
                                        type="email"
                                        name="email"
                                        value={formData.email}
                                        onChange={handleChange}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="email@example.com"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Username</label>
                                    <input
                                        type="text"
                                        name="username"
                                        value={formData.username}
                                        onChange={handleChange}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="Choose username"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                    <input
                                        type="password"
                                        name="password"
                                        value={formData.password}
                                        onChange={handleChange}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="At least 6 characters"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                                    <input
                                        type="password"
                                        name="confirmPassword"
                                        value={formData.confirmPassword}
                                        onChange={handleChange}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="Re-enter password"
                                    />
                                </div>
                                <button type="submit" className="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition font-medium">
                                    Create Account
                                </button>
                                <button type="button" onClick={() => setMode('login')} className="w-full text-sm text-blue-500 hover:underline">
                                    Already have an account? Sign in
                                </button>
                            </form>
                        )}

                        {mode === 'reset' && (
                            <form onSubmit={handleRequestReset} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Username</label>
                                    <input
                                        type="text"
                                        name="username"
                                        value={formData.username}
                                        onChange={handleChange}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="Enter your username"
                                    />
                                </div>
                                <button type="submit" className="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition font-medium">
                                    Request Reset Token
                                </button>
                                <button type="button" onClick={() => setMode('login')} className="w-full text-sm text-blue-500 hover:underline">
                                    Back to login
                                </button>
                            </form>
                        )}

                        {mode === 'resetConfirm' && (
                            <form onSubmit={handleResetPassword} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Reset Token</label>
                                    <input
                                        type="text"
                                        name="resetToken"
                                        value={formData.resetToken}
                                        onChange={handleChange}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="Paste token from alert"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                                    <input
                                        type="password"
                                        name="newPassword"
                                        value={formData.newPassword}
                                        onChange={handleChange}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="At least 6 characters"
                                    />
                                </div>
                                <button type="submit" className="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition font-medium">
                                    Reset Password
                                </button>
                                <button type="button" onClick={() => setMode('login')} className="w-full text-sm text-blue-500 hover:underline">
                                    Back to login
                                </button>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        // Header Component
        function Header({ user, onLogout, view, setView }) {
            return (
                <header className="bg-white shadow-sm border-b">
                    <div className="max-w-7xl mx-auto px-3 sm:px-4">
                        <div className="flex justify-between items-center h-14">
                            <div className="flex items-center space-x-2 sm:space-x-4">
                                <h1 className="text-lg sm:text-xl font-bold text-gray-800">📚 Inventory</h1>
                                <nav className="flex space-x-1">
                                    <button onClick={() => setView('search')} className={`px-2 sm:px-4 py-1.5 text-sm rounded-lg transition ${view === 'search' ? 'bg-blue-500 text-white' : 'text-gray-600 hover:bg-gray-100'}`}>
                                        Search
                                    </button>
                                    {user.role === 'admin' && (
                                        <button onClick={() => setView('admin')} className={`px-2 sm:px-4 py-1.5 text-sm rounded-lg transition ${view === 'admin' ? 'bg-blue-500 text-white' : 'text-gray-600 hover:bg-gray-100'}`}>
                                            Admin
                                        </button>
                                    )}
                                </nav>
                            </div>
                            <div className="flex items-center space-x-2">
                                <div className="text-sm">
                                    <div className="font-medium text-gray-700">{user.fullName}</div>
                                    <div className="text-xs text-gray-500 capitalize">{user.role}</div>
                                </div>
                                <button onClick={onLogout} className="px-3 py-1.5 text-xs sm:text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition">
                                    Logout
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        // Search View (same as before)
        function SearchView() {
            const [searchTerm, setSearchTerm] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searched, setSearched] = useState(false);

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchTerm.trim()) return;
                setLoading(true);
                setSearched(true);
                try {
                    const items = await SquareAPI.searchInventory(searchTerm);
                    setResults(items);
                } catch (error) {
                    console.error(error);
                    
                    if (error.message.includes('CORS')) {
                        alert('⚠️ CORS Error: This app cannot access Square API when embedded in Google Sites.\n\nSolution: Open this page directly in your browser (not in an iframe).\n\nURL: https://www.bestawros.com/books (or wherever you hosted it)');
                    } else {
                        alert('Failed to search inventory: ' + error.message);
                    }
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
                    <div className="mb-4 sm:mb-6">
                        <form onSubmit={handleSearch} className="flex gap-2">
                            <input 
                                type="text" 
                                value={searchTerm} 
                                onChange={(e) => setSearchTerm(e.target.value)} 
                                placeholder="Search by name, author, publisher, SKU..." 
                                className="flex-1 px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            />
                            <button 
                                type="submit" 
                                disabled={loading} 
                                className="px-4 sm:px-6 py-2 sm:py-3 text-sm sm:text-base bg-blue-500 text-white rounded-lg hover:bg-blue-600 disabled:opacity-50 transition"
                            >
                                {loading ? '...' : 'Search'}
                            </button>
                        </form>
                    </div>
                    {loading && (
                        <div className="text-center py-8 sm:py-12">
                            <div className="text-lg sm:text-xl text-gray-600">Searching...</div>
                        </div>
                    )}
                    {!loading && searched && results.length === 0 && (
                        <div className="text-center py-8 sm:py-12">
                            <div className="text-lg sm:text-xl text-gray-600">No results found</div>
                        </div>
                    )}
                    {!loading && results.length > 0 && (
                        <div>
                            <div className="mb-3 text-xs sm:text-sm text-gray-600">
                                Found {results.length} item{results.length !== 1 ? 's' : ''}
                            </div>
                            <div className="grid gap-3 sm:gap-4 sm:grid-cols-2 lg:grid-cols-3">
                                {results.map(item => <ItemCard key={item.id} item={item} />)}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Item Card (same as before)
        function ItemCard({ item }) {
            const [expanded, setExpanded] = useState(false);
            const getCleanDescription = (desc) => {
                if (!desc) return '';
                const lines = desc.split('\n');
                if (lines.length > 3) {
                    const lastThree = lines.slice(-3);
                    const hasAttrs = lastThree.some(line => 
                        line.startsWith('Author:') || line.startsWith('Publisher:') || line.startsWith('Shelf No:')
                    );
                    if (hasAttrs) return lines.slice(0, -3).join('\n');
                }
                return desc;
            };
            const cleanDescription = getCleanDescription(item.description);

            return (
                <div className="bg-white rounded-lg shadow-md p-4 hover:shadow-lg transition-shadow">
                    <h3 className="text-base sm:text-lg font-bold text-gray-800 mb-2">{item.name}</h3>
                    {cleanDescription && (
                        <p className="text-gray-600 text-xs sm:text-sm mb-2 whitespace-pre-line">
                            {expanded ? cleanDescription : cleanDescription.slice(0, 80) + (cleanDescription.length > 80 ? '...' : '')}
                        </p>
                    )}
                    {cleanDescription.length > 80 && (
                        <button onClick={() => setExpanded(!expanded)} className="text-blue-500 text-xs mb-2 hover:underline">
                            {expanded ? 'Show less' : 'Show more'}
                        </button>
                    )}
                    <div className="space-y-1 text-xs sm:text-sm">
                        {item.sku && <div className="flex"><span className="text-gray-500 w-16">SKU:</span><span className="text-gray-700 font-medium">{item.sku}</span></div>}
                        {item.price > 0 && <div className="flex"><span className="text-gray-500 w-16">Price:</span><span className="text-gray-700 font-medium">${item.price.toFixed(2)}</span></div>}
                        {item.author && <div className="flex"><span className="text-gray-500 w-16">Author:</span><span className="text-gray-700">{item.author}</span></div>}
                        {item.publisher && <div className="flex"><span className="text-gray-500 w-16">Publisher:</span><span className="text-gray-700 text-xs">{item.publisher}</span></div>}
                        {item.shelfNumber && <div className="flex"><span className="text-gray-500 w-16">Shelf:</span><span className="text-gray-700">{item.shelfNumber}</span></div>}
                    </div>
                </div>
            );
        }

        // Admin View
        function AdminView() {
            const [pendingUsers, setPendingUsers] = useState([]);
            const [allUsers, setAllUsers] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => { loadUsers(); }, []);

            const loadUsers = async () => {
                setLoading(true);
                const pending = await AuthManager.getPendingUsers();
                const all = await AuthManager.getAllUsers();
                setPendingUsers(pending);
                setAllUsers(all);
                setLoading(false);
            };

            const handleApprove = async (username) => { 
                await AuthManager.updateUserRole(username, 'user'); 
                await loadUsers(); 
            };
            
            const handleReject = async (username) => { 
                if (confirm(`Delete user ${username}?`)) {
                    await AuthManager.deleteUser(username); 
                    await loadUsers(); 
                }
            };
            
            const handleMakeAdmin = async (username) => { 
                if (confirm(`Make ${username} an admin?`)) { 
                    await AuthManager.updateUserRole(username, 'admin'); 
                    await loadUsers(); 
                } 
            };
            
            const handleRevokeAdmin = async (username) => { 
                if (confirm(`Revoke admin privileges from ${username}?`)) { 
                    await AuthManager.updateUserRole(username, 'user'); 
                    await loadUsers(); 
                } 
            };

            if (loading) return <div className="text-center py-8">Loading users...</div>;

            return (
                <div className="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
                    <h2 className="text-xl sm:text-2xl font-bold text-gray-800 mb-4 sm:mb-6">User Management</h2>
                    {pendingUsers.length > 0 && (
                        <div className="mb-6 sm:mb-8">
                            <h3 className="text-lg sm:text-xl font-semibold text-gray-700 mb-3 sm:mb-4">
                                Pending Approvals ({pendingUsers.length})
                            </h3>
                            <div className="bg-white rounded-lg shadow overflow-hidden">
                                {pendingUsers.map(user => (
                                    <div key={user.username} className="border-b last:border-b-0 p-3 sm:p-4">
                                        <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                                            <div>
                                                <div className="font-medium text-gray-800">{user.fullName}</div>
                                                <div className="text-sm text-gray-500">@{user.username} • {user.email}</div>
                                                <div className="text-xs text-gray-400">Registered: {new Date(user.createdAt).toLocaleDateString()}</div>
                                            </div>
                                            <div className="flex space-x-2">
                                                <button onClick={() => handleApprove(user.username)} className="px-3 sm:px-4 py-1.5 sm:py-2 text-sm bg-green-500 text-white rounded-lg hover:bg-green-600 transition">
                                                    Approve
                                                </button>
                                                <button onClick={() => handleReject(user.username)} className="px-3 sm:px-4 py-1.5 sm:py-2 text-sm bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                                                    Reject
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    <div>
                        <h3 className="text-lg sm:text-xl font-semibold text-gray-700 mb-3 sm:mb-4">
                            All Users ({allUsers.length})
                        </h3>
                        <div className="bg-white rounded-lg shadow overflow-hidden">
                            {allUsers.map(user => (
                                <div key={user.username} className="border-b last:border-b-0 p-3 sm:p-4">
                                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                                        <div>
                                            <div className="font-medium text-gray-800">{user.fullName}</div>
                                            <div className="text-sm text-gray-500">@{user.username} • {user.email}</div>
                                            <span className={`inline-block px-2 py-0.5 text-xs rounded mt-1 ${
                                                user.role === 'admin' ? 'bg-purple-100 text-purple-800' : 
                                                user.role === 'user' ? 'bg-blue-100 text-blue-800' : 
                                                'bg-yellow-100 text-yellow-800'
                                            }`}>
                                                {user.role}
                                            </span>
                                        </div>
                                        {user.role !== 'pending' && (
                                            <div>
                                                {user.role === 'user' && (
                                                    <button onClick={() => handleMakeAdmin(user.username)} className="px-3 sm:px-4 py-1.5 text-sm bg-purple-500 text-white rounded-lg hover:bg-purple-600 transition">
                                                        Make Admin
                                                    </button>
                                                )}
                                                {user.role === 'admin' && (
                                                    <button onClick={() => handleRevokeAdmin(user.username)} className="px-3 sm:px-4 py-1.5 text-sm bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                                                        Revoke Admin
                                                    </button>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
